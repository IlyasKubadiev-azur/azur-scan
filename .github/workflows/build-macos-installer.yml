name: Build macOS installer (.pkg + .dmg)

# Triggers:
#   1. Pushing a tag like `v0.1.1`, `v0.2.0-rc1` — produces a Release with
#      the .pkg + .dmg attached as downloadable assets.
#   2. Manual run via the "Run workflow" button on the Actions tab — useful
#      when you want a test build without bumping a tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the build (e.g. 0.1.1)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write   # needed to create / update a GitHub Release

jobs:
  build:
    runs-on: macos-latest   # Apple Silicon (arm64) — free for public repos

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout + Python
      # ---------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      # ---------------------------------------------------------------
      # 2. Derive version
      # ---------------------------------------------------------------
      - name: Resolve build version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ github.event.inputs.version || '0.0.0-dev' }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building version: $v"

      # ---------------------------------------------------------------
      # 3. Install agent + PyInstaller into a fresh venv
      # ---------------------------------------------------------------
      - name: Install agent dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      # ---------------------------------------------------------------
      # 4. Build the macOS binary + .pkg + .dmg
      # ---------------------------------------------------------------
      - name: Build .pkg and .dmg
        run: bash -x agent/installer/macos/build.sh --version "${{ steps.ver.outputs.version }}"

      # On failure: dump PyInstaller's warning log so we don't need to
      # squint at the run output to figure out missing modules / hooks.
      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-debug-${{ steps.ver.outputs.version }}
          path: |
            agent/build/_pyinstaller_work/**/warn-*.txt
            agent/build/_pyinstaller_work/**/xref-*.html
          if-no-files-found: ignore
          retention-days: 14

      # ---------------------------------------------------------------
      # 5. Upload as workflow artifacts (kept ~90 days, downloadable from
      #    the Actions tab even without a Release)
      # ---------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azur-scan-agent-macos-${{ steps.ver.outputs.version }}
          path: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          if-no-files-found: error
          retention-days: 90

      # ---------------------------------------------------------------
      # 6. On a tag push, attach to the GitHub Release
      # ---------------------------------------------------------------
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
