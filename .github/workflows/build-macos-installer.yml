name: Build macOS installer (.pkg + .dmg)

# Apple Silicon ONLY (M1/M2/M3/M4, 2020+).
#
# We dropped Intel Mac support in v0.1.8 — Apple stopped selling Intel Macs
# in 2020, GitHub's free `macos-13` runners are now sometimes queued for
# hours and were blocking releases. If Intel support is needed again later,
# revive the matrix from v0.1.7 (build-macos-installer.yml history) — it
# uses `lipo` to fuse arm64 + x86_64 into a single universal binary.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.1.8)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest   # Apple Silicon (arm64)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - name: Resolve build version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ github.event.inputs.version || '0.0.0-dev' }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Install agent deps
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build .pkg and .dmg
        run: bash -x agent/installer/macos/build.sh --version "${{ steps.ver.outputs.version }}"

      - name: Upload PyInstaller diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-debug-${{ steps.ver.outputs.version }}
          path: |
            agent/build/_pyinstaller_work/**/warn-*.txt
            agent/build/_pyinstaller_work/**/xref-*.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azur-scan-agent-macos-${{ steps.ver.outputs.version }}
          path: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          if-no-files-found: error
          retention-days: 90

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
