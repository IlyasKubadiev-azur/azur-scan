name: Build macOS installer (.pkg + .dmg)

# Produces a SINGLE universal binary `.pkg` and `.dmg` that runs natively
# on both Apple Silicon (arm64, M1/M2/M3/M4) and Intel (x86_64) Macs.
#
# Three jobs:
#   1. build-arm64   on macos-latest  — PyInstaller bundle for arm64
#   2. build-x86_64  on macos-13      — PyInstaller bundle for x86_64
#   3. package       on macos-latest  — downloads both binaries, lipo-merges
#                                       them, runs pkgbuild + hdiutil
#
# The two build jobs run in parallel; package waits on both. Net wall-clock
# = slower of the two builds + ~30s packaging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.1.7)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Per-arch builds — produce just the agent binary as an artifact
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - name: Install agent deps
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build agent binary (${{ matrix.arch }})
        working-directory: agent
        run: python build/build.py

      - name: Sanity-check architecture
        working-directory: agent
        run: |
          file dist/azurscan-agent
          arch_actual=$(lipo -archs dist/azurscan-agent 2>/dev/null || file -b dist/azurscan-agent | grep -oE 'x86_64|arm64')
          echo "binary arch = $arch_actual, expected = ${{ matrix.arch }}"
          # Ensure runner actually produced the arch it advertised
          if ! echo "$arch_actual" | grep -q "${{ matrix.arch }}"; then
              echo "ARCH MISMATCH"; exit 1
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-bin-${{ matrix.arch }}
          path: agent/dist/azurscan-agent
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Final packaging — lipo-merge + pkgbuild + dmg, runs once
  # ---------------------------------------------------------------------------
  package:
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve build version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ github.event.inputs.version || '0.0.0-dev' }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-bin-arm64
          path: bins/arm64

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-bin-x86_64
          path: bins/x86_64

      - name: Merge into universal binary with lipo
        run: |
          mkdir -p agent/dist
          chmod +x bins/arm64/azurscan-agent bins/x86_64/azurscan-agent
          lipo -create \
              -output agent/dist/azurscan-agent \
              bins/arm64/azurscan-agent \
              bins/x86_64/azurscan-agent
          chmod 755 agent/dist/azurscan-agent
          echo "=== Final binary ==="
          file agent/dist/azurscan-agent
          lipo -archs agent/dist/azurscan-agent

      - name: Build .pkg and .dmg from universal binary
        # build.sh detects an existing dist/azurscan-agent and skips its own
        # PyInstaller step via --skip-build.
        run: bash -x agent/installer/macos/build.sh \
                --version "${{ steps.ver.outputs.version }}" \
                --skip-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azur-scan-agent-macos-${{ steps.ver.outputs.version }}
          path: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          if-no-files-found: error
          retention-days: 90

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
