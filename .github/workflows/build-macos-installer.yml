name: Build macOS installer (.pkg + .dmg)

# Builds TWO installer pairs in parallel:
#   - arm64  on `macos-latest`  (Apple Silicon — M1/M2/M3/M4 Macs)
#   - x86_64 on `macos-13`      (Intel Macs, including older models like
#                                MacBook 12" 2016 with Core m3)
#
# Each lands in the same Release with an arch suffix in the file name.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the build (e.g. 0.1.6)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false   # one arch failing shouldn't kill the other
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - name: Resolve build version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ github.event.inputs.version || '0.0.0-dev' }}"
          fi
          # Suffix the arch so both DMGs land in the same Release with
          # distinct names: azur-scan-agent-0.1.6-arm64.dmg, -x86_64.dmg
          full="$v-${{ matrix.arch }}"
          echo "version=$full" >> "$GITHUB_OUTPUT"
          echo "Building: $full on ${{ matrix.runner }} (uname: $(uname -m))"

      - name: Install agent dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build .pkg and .dmg
        run: bash -x agent/installer/macos/build.sh --version "${{ steps.ver.outputs.version }}"

      - name: Upload PyInstaller diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-debug-${{ steps.ver.outputs.version }}
          path: |
            agent/build/_pyinstaller_work/**/warn-*.txt
            agent/build/_pyinstaller_work/**/xref-*.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azur-scan-agent-macos-${{ steps.ver.outputs.version }}
          path: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          if-no-files-found: error
          retention-days: 90

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/azur-scan-agent-*.pkg
            agent/dist/azur-scan-agent-*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
